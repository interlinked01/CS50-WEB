<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Descendant selectors</title>
    </head>
    <style>
        ul li { /* all descendants of ul will be selected */
            color:lightpink;
        }
    </style>
    <body>
        <ol>
            <li>item  one</li>
            <li>item two</li>
            <ul>
                <li>sub item one</li>
                <li>sub item two</li>
            </ul>
            <li>item three</li>
        </ol>


    </body>
</html>
