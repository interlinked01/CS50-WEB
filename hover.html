<!DOCTYPE html>
<html lang="en">

        button {
            width: 200px;
            height: 50px;
            font-size: 24px;
            background-color:rgb(213, 131, 25);
        }
        
        button:hover {
            background-color: red;
        }
  </style>
<body>
    <button>Click Me</button>

</body>
</html>
