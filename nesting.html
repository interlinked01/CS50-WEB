<!DOCTYPE html>
<html>
    <head> <title>Nesting</title></head>
    <link rel="stylesheet" href="nesting.css">
    <body>

        <div>
            <p>This is a paragraph inside a div.</p>
            List inside the div:
            <ul>
                <li>First item</li>
                <li>Second item</li>
                <li>Third item</li>
            </ul>
            <p>This is another paragraph inside the div.</p>
            List outside the div:
            <ul>
                <li>Fourth item</li>
                <li>Fifth item</li>
                <li>Sixth item</li>
            </ul>
        </div>
    </body>
</html>
