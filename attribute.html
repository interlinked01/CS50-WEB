<!DOCTYPE html>
<html>
    <head>
        <title>Attribute Selectors</title>
    </head>

<style>
    a {
        color: darkred;
    }
    a[href="https://google.com"] {
        color: darkblue;
    }

</style>
<body>
    <ul>
        <li><a href="https://google.com">Google</a></li>
         <li><a href="https://amazon.com">Amazon</a></li>
        <li><a href="https://instagram.com">Instagram</a></li>


    </ul>

</body>
</html>
