<!DOCTYPE html>
<html>
    <head> <title>Table</title></head>
    <style>
        table {
            border: 1px solid rgb(207, 100, 100);
            text-align: center;
            border-collapse: collapse,

        }
        td, th {
            border: 1px solid rgb(207, 100, 100);
            text-align: center;
            border-collapse: collapse;
            padding: 5px;
        }
        
    </style>
<body>
    <table>
        <thead
            <tr>
             <th>Ocean</th>
             <th>Average depth </th>
             <th> Max depth</th>
            </tr>
            
        </thead>
        <body>
           <tr> 
              <td>Pacific ocean </td>
              <td>4,280 m</td>
              <td>10,110 m</td>
            </tr>
            <tr>
               <td>Atlantic ocean</td>
               <td>3,940 m</td>
               <td>8,486 m</td>
            </tr>
        
    </table>
  

</body>

</html>
